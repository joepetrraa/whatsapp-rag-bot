<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>WhatsApp Bot Simple</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        'Segoe UI',
        Roboto,
        sans-serif;

      background:
        linear-gradient(
          135deg,
          #f5f7fa 0%,
          #eef2f5 100%
        );

      color: #2c3e50;

      padding: 24px;

      min-height: 100vh;
    }

    .container {

      max-width: 1000px;

      margin: 0 auto;
    }

    .header {

      background: white;

      padding: 32px;

      border-radius: 12px;

      margin-bottom: 24px;

      box-shadow:
        0 2px 8px
        rgba(44, 62, 80, 0.08);

      border-left:
        5px solid #2c3e50;
    }

    .header h1 {

      font-size: 28px;

      margin-bottom: 16px;

      font-weight: 700;
    }

    .status-bar {

      display: flex;

      align-items: center;

      gap: 12px;

      font-size: 14px;
    }

    .status-dot {

      width: 12px;

      height: 12px;

      border-radius: 50%;

      background: #bdc3c7;
    }

    .status-dot.active {

      background: #1abc9c;

      box-shadow:
        0 0 8px
        rgba(26, 188, 156, 0.4);
    }

    .content {

      background: white;

      padding: 40px;

      border-radius: 12px;

      box-shadow:
        0 2px 8px
        rgba(44, 62, 80, 0.08);

      min-height: 400px;
    }

    h2 {

      font-size: 24px;

      margin-bottom: 8px;

      font-weight: 700;
    }

    .subtitle {

      font-size: 14px;

      color: #7f8c8d;

      margin-bottom: 24px;
    }

    .alert {

      padding: 16px;

      border-radius: 8px;

      margin-bottom: 24px;

      font-size: 14px;

      border-left: 4px solid;

      line-height: 1.6;

      background: #e8f4f8;

      color: #0a4f6b;

      border-left-color: #3498db;
    }

    .button-group {

      display: flex;

      gap: 12px;

      margin-top: 20px;
    }

    .btn {

      background: #2c3e50;

      color: white;

      padding: 12px 24px;

      border: none;

      border-radius: 8px;

      cursor: pointer;

      font-size: 14px;

      font-weight: 600;

      transition: 0.3s;
    }

    .btn:hover {

      background: #1a252f;
    }

    .btn-danger {

      background: #e74c3c;
    }

    .btn-danger:hover {

      background: #c0392b;
    }

    .qr-container {

      text-align: center;

      padding: 40px 20px;
    }

    .qr-container h3 {

      margin-bottom: 12px;

      font-size: 18px;
    }

    .qr-container p {

      color: #7f8c8d;

      margin-bottom: 24px;

      font-size: 13px;
    }

    #qrcode {

      max-width: 300px;

      margin: 20px auto;

      padding: 16px;

      background: #f8fafb;

      border-radius: 12px;

      border: 1px solid #ecf0f1;
    }

    #qrcode img {

      width: 100%;

      max-width: 280px;
    }

    .ready-section {

      text-align: center;

      padding: 40px;
    }

    .ready-section h3 {

      font-size: 18px;

      margin-bottom: 12px;

      color: #1abc9c;
    }

    .ready-section p {

      color: #7f8c8d;
    }

    @media (max-width: 768px) {

      .header {

        padding: 20px;
      }

      .content {

        padding: 24px;
      }

      .button-group {

        flex-direction: column;
      }
    }

  </style>

</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <div class="header">

      <h1>
        Bot WhatsApp Sederhana
      </h1>

      <div class="status-bar">

        <span
          class="status-dot"
          id="statusDot"
        ></span>

        <span id="statusText">
          Bot Offline
        </span>

      </div>

    </div>

    <!-- CONTENT -->
    <div class="content">

      <h2>
        Kontrol Bot
      </h2>

      <p class="subtitle">
        Kelola koneksi bot WhatsApp Anda
      </p>

      <div class="alert">

        Gunakan panel ini untuk
        menghubungkan bot dengan
        akun WhatsApp Anda.

      </div>

      <!-- BUTTON -->
      <div class="button-group">

        <button
          class="btn"
          id="startBtn"
        >

          Start Bot

        </button>

      </div>

      <!-- QR -->
      <div
        id="qrSection"
        style="display:none;"
      >

        <div class="qr-container">

          <h3>
            Scan QR WhatsApp
          </h3>

          <p>

            Buka WhatsApp →
            Perangkat Tertaut →
            Tautkan Perangkat

          </p>

          <div id="qrcode"></div>

        </div>

      </div>

      <!-- READY -->
      <div
        id="readySection"
        style="display:none;"
      >

        <div class="ready-section">

          <h3>
            ✓ Bot Terhubung
          </h3>

          <p>
            Bot siap digunakan
          </p>

        </div>

      </div>

    </div>

  </div>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
